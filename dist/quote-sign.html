<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Signature</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-soft: rgba(14,165,233,0.12);
      --bg: #f3f4f6;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --surface: #ffffff;
      --surface-subtle: #f9fafb;
      --shadow-soft: 0 18px 45px rgba(15,23,42,0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 24px 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:#f2f5fc9c;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 1100px;
      margin: 12px auto 24px;
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 24px 24px 28px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1::before {
      content: '';
      width: 7px;
      height: 26px;
      border-radius: 999px;
      background: linear-gradient(180deg, #0ea5e9, #38bdf8);
    }
    h2 {
      margin: 24px 0 12px;
      font-size: 18px;
      letter-spacing: -0.01em;
    }
    p {
      margin: 4px 0;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .quote-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .card {
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.35);
      padding: 16px 18px;
      background: linear-gradient(135deg, #f9fafb, #ffffff);
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #6b7280;
    }
    .value {
      font-weight: 600;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .sig-container {
      margin-top: 24px;
      display: grid;
      gap: 16px;
    }
    .sig-mode-toggle {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      overflow: hidden;
      background: linear-gradient(90deg, #eff6ff, #f9fafb);
      padding: 2px;
    }
    .sig-mode-toggle button {
      border: none;
      background: transparent;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #4b5563;
      border-radius: 999px;
      transition: background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
    }
    .sig-mode-toggle button.active {
      background: #ffffff;
      color: #0f172a;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(148,163,184,0.65);
      transform: translateY(-0.5px);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 10px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }
    input[type="text"] {
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.7);
      font-size: 14px;
      background: var(--surface);
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(14,165,233,0.55);
      background: #f9feff;
    }
    #sigCanvas {
      width: 100%;
      max-width: 100%;
      height: 180px;
      border-radius: 10px;
      border: 1px dashed #9ca3af;
      background: #f9fafb;
      touch-action: none;
    }
    .sig-hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
    .actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button.primary {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(56,189,248,0.45);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.12s ease, box-shadow 0.16s ease, filter 0.12s ease;
    }
    button.secondary {
      background: #e5e7eb;
      color: #374151;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 22px rgba(56,189,248,0.55);
      filter: brightness(1.02);
    }
    button.secondary:hover:not(:disabled) {
      background: #d1d5db;
    }
    button:focus-visible {
      outline: 2px solid rgba(14,165,233,0.8);
      outline-offset: 2px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }
    .status {
      margin-top: 14px;
      font-size: 13px;
    }
    .status.ok {
      color: #16a34a;
    }
    .status.err {
      color: #dc2626;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #4b5563;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(59,130,246,0.09);
      color: #1d4ed8;
      border: 1px solid rgba(59,130,246,0.25);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 10px;
      }
      .page {
        padding: 18px 14px 22px;
        border-radius: 14px;
      }
      h1 {
        font-size: 20px;
      }
      h1::before {
        height: 22px;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .actions {
        flex-direction: column;
        align-items: stretch;
      }
      .actions button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>BESF LLC — Proposal</h1>
    </header>

    <section id="quoteInfo" class="card" style="margin-top:16px;">
      <p class="muted">Loading quote details…</p>
    </section>

    <section class="sig-container">
      <div>
        <h2>Sign This Quote</h2>
        <p class="muted">You can either type your full name or draw your signature.</p>
      </div>

      <div class="sig-mode-toggle" aria-label="Signature mode">
        <button type="button" id="modeTyped" class="active">Type</button>
        <button type="button" id="modeDrawn">Draw</button>
      </div>

      <div class="field">
        <label for="typedName">Typed Signature (full name)</label>
        <input id="typedName" type="text" placeholder="Enter your full name" autocomplete="name" />
        <div class="sig-hint">If you prefer, switch to the Draw tab to sign by hand.</div>
      </div>

      <div class="field" id="canvasField" style="display:none;">
        <label>Drawn Signature</label>
        <canvas id="sigCanvas"></canvas>
        <div class="sig-hint">Use your mouse or finger to draw your signature. Use Clear if you want to start over.</div>
      </div>

      <div class="actions">
        <button id="submitBtn" class="primary">Submit Signature</button>
        <button id="clearBtn" class="secondary" type="button">Clear Drawing</button>
        <span id="statusText" class="status"></span>
      </div>
    </section>
  </div>

  <script>
    let currentQuote = null;
    let isSubmitting = false;
    let drawMode = false;
    let isDrawing = false;
    let hasDrawing = false;

    const quoteInfoEl = document.getElementById('quoteInfo');
    const typedNameEl = document.getElementById('typedName');
    const statusTextEl = document.getElementById('statusText');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modeTypedBtn = document.getElementById('modeTyped');
    const modeDrawnBtn = document.getElementById('modeDrawn');
    const canvasField = document.getElementById('canvasField');
    const canvas = document.getElementById('sigCanvas');
    const ctx = canvas.getContext('2d');

    function setStatus(msg, kind) {
      statusTextEl.textContent = msg || '';
      statusTextEl.classList.remove('ok', 'err');
      if (kind === 'ok') statusTextEl.classList.add('ok');
      if (kind === 'err') statusTextEl.classList.add('err');
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#111827';
      ctx.clearRect(0, 0, rect.width, rect.height);
      hasDrawing = false;
    }

    function getPos(evt) {
      const rect = canvas.getBoundingClientRect();
      if (evt.touches && evt.touches[0]) {
        return {
          x: evt.touches[0].clientX - rect.left,
          y: evt.touches[0].clientY - rect.top
        };
      }
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    function startDraw(evt) {
      if (!drawMode) return;
      evt.preventDefault();
      isDrawing = true;
      hasDrawing = true;
      const { x, y } = getPos(evt);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function moveDraw(evt) {
      if (!drawMode || !isDrawing) return;
      evt.preventDefault();
      const { x, y } = getPos(evt);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function endDraw(evt) {
      if (!drawMode) return;
      evt && evt.preventDefault();
      isDrawing = false;
      ctx.closePath();
    }

    function clearCanvas() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      hasDrawing = false;
    }

    function setModeTyped() {
      drawMode = false;
      modeTypedBtn.classList.add('active');
      modeDrawnBtn.classList.remove('active');
      canvasField.style.display = 'none';
      clearBtn.disabled = true;
      setStatus('', null);
    }

    function setModeDrawn() {
      drawMode = true;
      modeDrawnBtn.classList.add('active');
      modeTypedBtn.classList.remove('active');
      canvasField.style.display = 'flex';
      clearBtn.disabled = false;
      setStatus('', null);
    }

    async function loadQuote() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('quoteId') || params.get('id');
      if (!id) {
        quoteInfoEl.innerHTML = '<p class="status err">Missing quote id in link.</p>';
        submitBtn.disabled = true;
        return;
      }
      try {
        const res = await fetch(`/api/quotes/${encodeURIComponent(id)}`);
        if (!res.ok) throw new Error('Failed to load quote');
        const q = await res.json();
        currentQuote = q;
        const totalNum = q.totals && typeof q.totals.total === 'number' ? q.totals.total : 0;
        const total = totalNum ? totalNum.toLocaleString(undefined, { minimumFractionDigits: 2 }) : '—';

        // Group line items by inferred category to mirror quotes.html
        const groupLineItemsByCategory = (items) => {
          const groups = {};
          (items || []).forEach((item) => {
            let category = 'General';
            if (item.name && item.name.includes('-')) {
              category = item.name.split('-').slice(1).join('-').trim();
              if (!category) category = 'General';
            }
            if (!groups[category]) groups[category] = [];
            groups[category].push(item);
          });
          return groups;
        };

        const capitalizeCategory = (str) => {
          if (!str) return '';
          return str.replace(/\b\w/g, (c) => c.toUpperCase());
        };

        const grouped = groupLineItemsByCategory(q.lineItems || []);
        let items = '';
        Object.keys(grouped).forEach((category) => {
          const categoryTotal = grouped[category].reduce((sum, item) => {
            const rate = item.rate || 0;
            const qty = item.qty || 0;
            return sum + rate * qty;
          }, 0);

          items += `
            <tr>
              <td colspan="4" style="background:#e9f2fa; font-weight:500; color:#217dbb; letter-spacing:0.08em; padding:9px 10px 9px 12px; border-radius:10px 0 0 10px; border:1px solid #e5e7eb; border-right:none; text-transform:uppercase;">
                ${capitalizeCategory(category)}
              </td>
              <td style="background:#e9f2fa; font-weight:600; color:#217dbb; text-align:right; padding:9px 12px; font-variant-numeric:tabular-nums; border-radius:0 10px 10px 0; border:1px solid #e5e7eb; border-left:none;">
                $${categoryTotal.toLocaleString(undefined, { minimumFractionDigits: 2 })}
              </td>
            </tr>
          `;
          grouped[category].forEach((item, idx) => {
            const rowBg = idx % 2 === 0 ? '#ffffff' : '#f9fafb';
            const rate = item.rate || 0;
            const qty = item.qty || 0;
            const lineTotal = rate * qty;
            items += `
              <tr style="background:transparent; vertical-align:top;">
                <td style="padding:8px 10px; border-radius:10px 0 0 10px; font-weight:500; color:#111827; background:${rowBg}; border:1px solid #e5e7eb; border-right:none; box-shadow:0 3px 8px rgba(15,23,42,0.06);">
                  ${item.name || ''}
                </td>
                <td style="padding:8px 10px; background:${rowBg}; color:#4b5563; font-size:12px; border-top:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb;">
                  ${item.description || ''}
                </td>
                <td style="padding:8px 10px; background:${rowBg}; text-align:right; font-variant-numeric:tabular-nums; border-top:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb;">
                  $${rate.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                </td>
                <td style="padding:8px 10px; background:${rowBg}; text-align:right; font-variant-numeric:tabular-nums; border-top:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb;">
                  ${qty}
                </td>
                <td style="padding:8px 10px; border-radius:0 10px 10px 0; text-align:right; font-weight:600; font-variant-numeric:tabular-nums; background:${rowBg}; border:1px solid #e5e7eb; border-left:none; box-shadow:0 3px 8px rgba(15,23,42,0.06);">
                  $${lineTotal.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                </td>
              </tr>
            `;
          });
        });

        const percs = (q.paymentTerms && Array.isArray(q.paymentTerms.percentages))
          ? q.paymentTerms.percentages
          : [30, 30, 30, 10];
        const labels = ['project start','50% project completion','75% project completion','final completion'];
        const amounts = percs.map(p => (totalNum * (p / 100)).toLocaleString(undefined, { minimumFractionDigits: 2 }));
        const paymentTermsHTML = `
          <ul style="margin-top: 10px; padding-left: 20px;">
            ${percs.map((p, i) => `<li><strong>${Number(p).toFixed(1)}%</strong> at ${labels[i] || 'milestone'}: <strong>$${amounts[i]}</strong></li>`).join('')}
          </ul>
        `;

        const hasSig = q.signature && q.signature.name;
        const sigName = hasSig ? q.signature.name : (q.to && q.to.name ? q.to.name : '____________________________');
        const sigDate = hasSig && q.signature.signedAt
          ? new Date(q.signature.signedAt).toLocaleDateString()
          : '____________________________';
        const sigHTML = hasSig && q.signature.type === 'drawn' && q.signature.imageData
          ? `<img src="${q.signature.imageData}" alt="Client signature" style="max-height:60px; margin-top:4px; display:block;">`
          : sigName;

        quoteInfoEl.innerHTML = `
          <div class="quote-header">
            <div>
              <div class="label">Quote</div>
              <div class="value">#${q.quoteNumber || ''}</div>
              <p class="muted">From BESF LLC to ${q.to?.name || 'client'}</p>
            </div>
            <div style="text-align:right;">
              <div class="label">Total</div>
              <div class="value">$${total}</div>
              <div style="margin-top:4px;">
                <span class="pill">Online signature request</span>
              </div>
            </div>
          </div>

          <div style="margin-top:14px; font-size:13px; color:#4b5563;">
            As a general contractor, we provide preliminary property assessments focused on scope estimation and visible conditions.  Our initial walk-through serves as a quick evaluation to help identify potential work items and budget ranges.  However, for a comprehensive review of all structural, mechanical, and system-related components, we strongly recommend a licensed home inspector conduct a full inspection to verify the condition of major items.  Also, please note, historical properties and existing stop work order may result in additional timelines and unforeseen costs not listed in this proposal.
          </div>

          <div style="margin-top:18px; border-top:1px solid #e5e7eb; padding-top:14px; display:flex; flex-wrap:wrap; gap:18px; align-items:flex-start;">
            <div style="flex:1 1 220px; min-width:200px;">
              <div class="label">From</div>
              <div class="value">${q.from?.name || ''}</div>
              <p class="muted">${q.from?.address || ''}</p>
              <p class="muted">${q.from?.email || ''}</p>
              <p class="muted">${q.from?.phone || ''}</p>
              <p class="muted"><strong>License:</strong> ${q.from?.license || 'RBC-2400049'}</p>
            </div>
            <div style="flex:1 1 220px; min-width:200px;">
              <div class="label">To</div>
              <div class="value">${q.to?.name || ''}</div>
              <p class="muted">${q.to?.address || ''}</p>
              <p class="muted">${q.to?.email || ''}</p>
              <p class="muted">${q.to?.phone || ''}</p>
            </div>
            <div style="flex:1 1 160px; min-width:160px;">
              <div class="label">Dates</div>
              <p class="muted"><strong>Date:</strong> ${q.date ? new Date(q.date).toLocaleDateString() : '—'}</p>
              <p class="muted"><strong>Valid till:</strong> ${q.validTill ? new Date(q.validTill).toLocaleDateString() : '—'}</p>
            </div>
          </div>

          <div style="margin-top:22px; padding:14px 14px 12px; border-radius:14px; background:var(--surface-subtle); border:1px solid rgba(148,163,184,0.4);">
            <h2 style="margin:0 0 10px; font-size:16px; display:flex; align-items:center; justify-content:space-between; gap:8px;">
              <span>Line Items</span>
              <span style="font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:#6b7280;">Breakdown</span>
            </h2>
            <div style="overflow-x:auto; margin-top:4px;">
              <table style="width:100%; border-collapse:separate; border-spacing:0 6px; font-size:13px; background:transparent;">
                <thead>
                  <tr style="background:#f1f5f9">
                    <th style="padding:8px 10px; border-radius:10px 0 0 10px; text-align:left; font-weight:500; color:#4b5563;">Item</th>
                    <th style="padding:8px 10px; text-align:left; font-weight:500; color:#4b5563;">Description</th>
                    <th style="padding:8px 10px; text-align:right; font-weight:500; color:#4b5563;">Rate</th>
                    <th style="padding:8px 10px; text-align:right; font-weight:500; color:#4b5563;">Qty</th>
                    <th style="padding:8px 10px; border-radius:0 10px 10px 0; text-align:right; font-weight:500; color:#4b5563;">Total</th>
                  </tr>
                </thead>
                <tbody>${items}</tbody>
              </table>
            </div>
          </div>

          <div style="margin-top:14px; text-align:right; font-size:13px; display:flex; flex-wrap:wrap; justify-content:flex-end; gap:8px 24px;">
            <p style="margin:0; color:#4b5563;"><strong>Subtotal:</strong> $${(q.totals?.subtotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
            <p style="margin:0; color:#4b5563;"><strong>Discount:</strong> $${(q.totals?.discount || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
            <p style="margin:0; color:#4b5563;"><strong>Tax:</strong> ${((q.totals?.tax || 0)).toLocaleString(undefined, { minimumFractionDigits: 2 })}%</p>
            <p style="margin:0; font-size:14px;"><strong>Total:</strong> $${total}</p>
          </div>

          <div style="margin-top:18px; padding:12px 14px; border-radius:12px; background:#f1f5f9; border:1px solid rgba(59,130,246,0.35);">
            <div class="label">Payment Terms</div>
            <div style="font-size:13px; color:#111827; margin-top:4px;">
              ${paymentTermsHTML}
              <p style="margin-top:8px; color:#4b5563;">All payments are due within 7 days of invoice unless otherwise agreed upon in writing. Late payments may be subject to additional fees.</p>
              <p style="margin-top:8px; color:#111827;"><strong>Change Orders:</strong></p>
              <p style="margin-top:8px; color:#4b5563;">All approved change orders are billable and due upon receipt. Work associated with change orders may be paused until payment is received.</p>
            </div>
          </div>

             <div style="margin-top:18px; padding:12px 14px; border-radius:12px; background:var(--surface-subtle); border:1px solid rgba(148,163,184,0.35);">
             <div class="label">Notes</div>
            <p style="font-size:13px; color:#111827; margin-top:4px; white-space:pre-wrap;">${q.notes || 'Any item not specifically listed in this proposal is not included in the scope of work.  Upon execution, this proposal supersedes any prior verbal discussions or agreements related to this project.'}</p>
            </div>

          <div style="margin-top:18px; padding:12px 14px; border-radius:12px; background:var(--surface-subtle); border:1px solid rgba(148,163,184,0.35);">
            <div class="label">Questions?</div>
            <p style="margin-top:8px; font-size:13px; color:#111827;">If you have any questions or concerns, please feel free to contact a member of our team directly.</p>

            <div style="margin-top:10px; padding:10px 12px; border-radius:10px; background:#f1f5f9; border:1px solid rgba(37,99,235,0.25); display:flex; flex-wrap:wrap; gap:6px 18px; align-items:flex-start;">
              <div style="min-width:140px;">
                <div style="font-size:13px; font-weight:600; color:#0f172a;">Jasson Godoy</div>
              </div>
              <div style="font-size:12px; color:#111827; display:flex; flex-direction:column; gap:2px;">
                <span><strong>Email:</strong> besf.jasson@gmail.com</span>
                <span><strong>Direct:</strong> (725) 260-3319</span>
              </div>
            </div>

            <div style="margin-top:10px; padding:10px 12px; border-radius:10px; background:#f1f5f9; border:1px solid rgba(37,99,235,0.25); display:flex; flex-wrap:wrap; gap:6px 18px; align-items:flex-start;">
              <div style="min-width:140px;">
                <div style="font-size:13px; font-weight:600; color:#0f172a;">Shannon Follansbee</div>
              </div>
              <div style="font-size:12px; color:#111827; display:flex; flex-direction:column; gap:2px;">
                <span><strong>Email:</strong> besfllc@gmail.com</span>
                <span><strong>Direct:</strong> (917) 808-6098</span>
              </div>
            </div>

            <div style="margin-top:10px; font-size:13px; color:#111827;"><strong>We look forward to working with you!</strong></div>
          </div>

          <div style="margin-top:18px; padding:12px 14px; border-radius:12px; background:#f1f5f9; border:1px solid rgba(148,163,184,0.4);">
            <div class="label">Agreement</div>
            <p style="font-size:13px; color:#111827; margin-top:4px;">By signing below, you agree to the scope of work and payment terms described above.</p>
            <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:18px 32px; align-items:flex-end; font-size:13px;">
              <div><strong>Client Name:</strong> ${sigName}</div>

                <strong>Signature:</strong><br>
                ${sigHTML}
              </div>
              <div><strong>Date:</strong> ${sigDate}</div>
            </div>
          </div>
        `;

        // Prefill name
        if (q.to && q.to.name && !typedNameEl.value) {
          typedNameEl.value = q.to.name;
        }

        // If already signed, show status and lock inputs
        if (hasSig) {
          setStatus(`This quote was signed by ${sigName}${sigDate !== '____________________________' ? ' on ' + sigDate : ''}.`, 'ok');
          submitBtn.disabled = true;
          clearBtn.disabled = true;
          typedNameEl.disabled = true;
          canvasField.style.pointerEvents = 'none';
        }
      } catch (err) {
        console.error(err);
        quoteInfoEl.innerHTML = '<p class="status err">Unable to load this quote. The link may be invalid or expired.</p>';
        submitBtn.disabled = true;
      }
    }

    async function submitSignature() {
      if (isSubmitting) return;
      if (!currentQuote || !currentQuote._id) {
        setStatus('Quote is not loaded.', 'err');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('quoteId') || params.get('id');
      if (!id) {
        setStatus('Missing quote id in link.', 'err');
        return;
      }

      let name = typedNameEl.value.trim();
      let type = 'typed';
      let imageData = null;

      if (drawMode) {
        if (!hasDrawing) {
          setStatus('Please draw your signature or switch to Type mode.', 'err');
          return;
        }
        type = 'drawn';
        if (!name && currentQuote.to && currentQuote.to.name) {
          name = currentQuote.to.name;
        }
        imageData = canvas.toDataURL('image/png');
      }

      if (!name) {
        setStatus('Please type your full name as your signature.', 'err');
        return;
      }

      isSubmitting = true;
      submitBtn.disabled = true;
      setStatus('Submitting signature…', null);

      try {
        const res = await fetch(`/api/quotes/${encodeURIComponent(id)}/signature`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, type, imageData })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({ error: 'Failed to save signature.' }));
          throw new Error(data.error || 'Failed to save signature.');
        }

        setStatus('Thank you. Your signature has been recorded.', 'ok');
        submitBtn.disabled = true;
        clearBtn.disabled = true;
        typedNameEl.disabled = true;
        canvasField.style.pointerEvents = 'none';
      } catch (err) {
        console.error(err);
        setStatus(err.message || 'Unable to submit signature. Please try again.', 'err');
        submitBtn.disabled = false;
      } finally {
        isSubmitting = false;
      }
    }

    // Event wiring
    window.addEventListener('load', () => {
      resizeCanvas();
      loadQuote();
    });

    window.addEventListener('resize', () => {
      if (drawMode) resizeCanvas();
    });

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });

    clearBtn.addEventListener('click', () => {
      if (!drawMode) return;
      clearCanvas();
      setStatus('', null);
    });

    submitBtn.addEventListener('click', (e) => {
      e.preventDefault();
      submitSignature();
    });

    modeTypedBtn.addEventListener('click', () => {
      setModeTyped();
    });

    modeDrawnBtn.addEventListener('click', () => {
      setModeDrawn();
      resizeCanvas();
    });

    // Initialize default mode
    setModeTyped();
  </script>
